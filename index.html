<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Piraeus Technology — Software for modern life</title>
  <meta name="description" content="Piraeus Technology builds software for modern life.">
  <meta property="og:title" content="Piraeus Technology">
  <meta property="og:description" content="Software for modern life">
  <meta property="og:image" content="https://piraeus.app/og-image.png">
  <meta property="og:url" content="https://piraeus.app">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='12' fill='%230d1b2a'/><text x='32' y='42' text-anchor='middle' font-family='Arial' font-size='32' font-weight='bold' fill='white'>P</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #0d1b2a;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated network background */
    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 40px 24px;
    }

    /* Logo */
    .logo-icon {
      display: inline-block;
      margin-bottom: 32px;
    }

    .logo-text {
      font-size: clamp(48px, 8vw, 80px);
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 8px;
    }

    .logo-sub {
      font-size: clamp(14px, 2.5vw, 20px);
      font-weight: 400;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      opacity: 0.7;
      margin-bottom: 40px;
    }

    .tagline {
      font-size: clamp(18px, 3vw, 24px);
      font-weight: 300;
      color: #7eb8c9;
      letter-spacing: 0.02em;
    }

    /* Fade in animation */
    .fade-in {
      opacity: 0;
      transform: translateY(20px);
      animation: fadeIn 1s ease-out forwards;
    }

    .fade-in:nth-child(2) { animation-delay: 0.2s; }
    .fade-in:nth-child(3) { animation-delay: 0.4s; }
    .fade-in:nth-child(4) { animation-delay: 0.6s; }

    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .contact {
      margin-top: 60px;
      opacity: 0;
      animation: fadeIn 1s ease-out 1s forwards;
    }

    .contact a {
      color: #7eb8c9;
      text-decoration: none;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.05em;
      padding: 10px 24px;
      border: 1px solid rgba(126, 184, 201, 0.3);
      border-radius: 999px;
      transition: all 0.3s ease;
    }

    .contact a:hover {
      background: rgba(126, 184, 201, 0.1);
      border-color: rgba(126, 184, 201, 0.6);
    }
  </style>
</head>
<body>
  <canvas id="network"></canvas>

  <div class="content">
    <!-- Logo icon -->
    <div class="fade-in logo-icon">
      <svg width="72" height="72" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="8" y="12" width="40" height="48" rx="2" stroke="white" stroke-width="4" fill="none"/>
        <rect x="32" y="12" width="24" height="32" rx="2" fill="white" opacity="0.9"/>
        <rect x="24" y="12" width="4" height="48" fill="#0d1b2a"/>
      </svg>
    </div>

    <div class="fade-in">
      <h1 class="logo-text">Piraeus</h1>
    </div>

    <div class="fade-in">
      <p class="logo-sub">Technology</p>
    </div>

    <div class="fade-in">
      <p class="tagline">Software for modern life</p>
    </div>

    <div class="contact">
      <a href="mailto:admin@piraeus.app">Contact Us</a>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('network');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let w, h;

    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
    }

    function init() {
      resize();
      particles = [];
      const count = Math.min(Math.floor((w * h) / 15000), 80);
      for (let i = 0; i < count; i++) {
        particles.push({
          x: Math.random() * w,
          y: Math.random() * h,
          vx: (Math.random() - 0.5) * 0.3,
          vy: (Math.random() - 0.5) * 0.3,
          r: Math.random() * 2 + 1,
        });
      }
    }

    function draw() {
      ctx.clearRect(0, 0, w, h);

      // Draw connections
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 180) {
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.strokeStyle = `rgba(126, 184, 201, ${0.15 * (1 - dist / 180)})`;
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        }
      }

      // Draw particles
      for (const p of particles) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(126, 184, 201, ${0.3 + p.r * 0.15})`;
        ctx.fill();

        // Glow
        if (p.r > 2) {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r * 3, 0, Math.PI * 2);
          const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 3);
          grad.addColorStop(0, 'rgba(126, 184, 201, 0.15)');
          grad.addColorStop(1, 'rgba(126, 184, 201, 0)');
          ctx.fillStyle = grad;
          ctx.fill();
        }

        // Move
        p.x += p.vx;
        p.y += p.vy;
        if (p.x < 0 || p.x > w) p.vx *= -1;
        if (p.y < 0 || p.y > h) p.vy *= -1;
      }

      requestAnimationFrame(draw);
    }

    window.addEventListener('resize', () => { resize(); });
    init();
    draw();
  </script>
</body>
</html>
