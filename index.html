<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Piraeus Technology — Software for modern life</title>
  <meta name="description" content="Piraeus Technology builds software for modern life.">
  <meta property="og:title" content="Piraeus Technology">
  <meta property="og:description" content="Software for modern life">
  <meta property="og:image" content="https://piraeus.app/og-image.png">
  <meta property="og:url" content="https://piraeus.app">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='12' fill='%231E2A44'/><text x='32' y='42' text-anchor='middle' font-family='Inter,Arial' font-size='32' font-weight='600' fill='white'>P</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
      background: #111827;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .hero-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      background: #111827;
    }

    .hero-bg img {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100%;
      height: auto;
      mask-image: radial-gradient(ellipse 90% 80% at center, black 50%, transparent 100%);
      -webkit-mask-image: radial-gradient(ellipse 90% 80% at center, black 50%, transparent 100%);
    }

    @media (min-width: 769px) {
      .hero-bg img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        mask-image: none;
        -webkit-mask-image: none;
      }
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    .content {
      position: fixed;
      bottom: 48px;
      left: 0;
      right: 0;
      z-index: 2;
      text-align: center;
    }

    @media (max-width: 768px) {
      .content {
        bottom: 120px;
      }
    }

    /* Fade in animation */
    .fade-in {
      opacity: 0;
      transform: translateY(20px);
      animation: fadeIn 1s ease-out forwards;
    }

    .fade-in-delay-1 { animation-delay: 0.3s; }
    .fade-in-delay-2 { animation-delay: 0.6s; }

    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .contact {
      opacity: 0;
      animation: fadeIn 1s ease-out 1s forwards;
    }

    .contact a {
      color: #4DA3FF;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.03em;
      padding: 10px 28px;
      border: 1px solid rgba(77, 163, 255, 0.3);
      border-radius: 999px;
      transition: all 0.3s ease;
    }

    .contact a:hover {
      background: rgba(77, 163, 255, 0.1);
      border-color: rgba(77, 163, 255, 0.6);
    }
  </style>
</head>
<body>
  <div class="hero-bg"><img src="hero.png" alt=""></div>
  <canvas id="network"></canvas>

  <div class="content">
    <div class="contact">
      <a href="mailto:contact@piraeus.app">Contact Us</a>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('network');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let w, h;

    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
    }

    function init() {
      resize();
      particles = [];
      const count = Math.min(Math.floor((w * h) / 15000), 80);
      for (let i = 0; i < count; i++) {
        particles.push({
          x: Math.random() * w,
          y: Math.random() * h,
          vx: (Math.random() - 0.5) * 0.3,
          vy: (Math.random() - 0.5) * 0.3,
          r: Math.random() * 2 + 1,
        });
      }
    }

    function draw() {
      ctx.clearRect(0, 0, w, h);

      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 180) {
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.strokeStyle = `rgba(77, 163, 255, ${0.1 * (1 - dist / 180)})`;
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        }
      }

      for (const p of particles) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(77, 163, 255, ${0.2 + p.r * 0.1})`;
        ctx.fill();

        if (p.r > 2) {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r * 3, 0, Math.PI * 2);
          const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 3);
          grad.addColorStop(0, 'rgba(77, 163, 255, 0.12)');
          grad.addColorStop(1, 'rgba(77, 163, 255, 0)');
          ctx.fillStyle = grad;
          ctx.fill();
        }

        p.x += p.vx;
        p.y += p.vy;
        if (p.x < 0 || p.x > w) p.vx *= -1;
        if (p.y < 0 || p.y > h) p.vy *= -1;
      }

      requestAnimationFrame(draw);
    }

    window.addEventListener('resize', resize);
    init();
    draw();
  </script>
</body>
</html>
